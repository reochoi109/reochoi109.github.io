<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="320" viewBox="0 0 1400 320" role="img" aria-label="Headway/GAP 분석 흐름도">
  <defs>
    <style>
      .box { fill:#ffffff; stroke:#1f2937; stroke-width:2; rx:14; ry:14; }
      .title { font: 700 16px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#111827; }
      .desc { font: 500 13px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#374151; }
      .arrow { stroke:#111827; stroke-width:2.5; fill:none; }
      .hint { font: 600 12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#6b7280; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827"/>
    </marker>
  </defs>

  <rect x="20" y="26" width="1360" height="268" fill="#f8fafc" stroke="#e5e7eb" stroke-width="2" rx="18" ry="18"/>
  <text x="40" y="58" class="title">Headway / GAP 기반 교통류 지표 산출 → 신호 운영 개선 입력</text>

  <!-- Boxes -->
  <rect class="box" x="60"  y="120" width="210" height="120"/>
  <text x="80" y="152" class="title">차량 검지 이벤트</text>
  <text x="80" y="178" class="desc">시간, 차로, 차종, 속도</text>
  <text x="80" y="202" class="desc">기준정보(차량 길이)</text>

  <rect class="box" x="320" y="120" width="210" height="120"/>
  <text x="340" y="152" class="title">차로별 그룹화</text>
  <text x="340" y="178" class="desc">시간순 정렬</text>
  <text x="340" y="202" class="desc">연속 차량 쌍 생성</text>

  <rect class="box" x="580" y="120" width="210" height="120"/>
  <text x="600" y="152" class="title">현시(Phase) 분할</text>
  <text x="600" y="178" class="desc">동일 현시 내 연속쌍만</text>
  <text x="600" y="202" class="desc">유효 후보로 채택</text>

  <rect class="box" x="840" y="120" width="210" height="120"/>
  <text x="860" y="152" class="title">지표 계산</text>
  <text x="860" y="178" class="desc">Headway = Δt(sec)</text>
  <text x="860" y="202" class="desc">GAP = Headway - (L / v)</text>

  <rect class="box" x="1100" y="120" width="240" height="120"/>
  <text x="1120" y="152" class="title">필터·집계·적재</text>
  <text x="1120" y="178" class="desc">이상치 제거(노이즈/불일치)</text>
  <text x="1120" y="202" class="desc">사이클 단위 평균/합계</text>
  <text x="1120" y="226" class="desc">신호 운영 KPI 저장</text>

  <!-- Arrows -->
  <path class="arrow" d="M270 180 L320 180" marker-end="url(#arrowhead)"/>
  <path class="arrow" d="M530 180 L580 180" marker-end="url(#arrowhead)"/>
  <path class="arrow" d="M790 180 L840 180" marker-end="url(#arrowhead)"/>
  <path class="arrow" d="M1050 180 L1100 180" marker-end="url(#arrowhead)"/>
</svg>
