baseURL = '/'
languageCode = 'en-us'
defaultContentLanguage = 'en'
title = 'Studio'
theme = 'studio'
enableRobotsTXT = true

[pagination]
pagerSize = 12

[taxonomies]
tag = 'tags'
category = 'categories'

[params]
description = 'A minimal Hugo theme starter'
author = ''
