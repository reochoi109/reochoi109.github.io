baseURL = 'https://reochoi109.github.io/'
languageCode = 'ko-kr'
defaultContentLanguage = 'ko'
defaultContentLanguageInSubdir = true
title = 'Reo Blog'
theme = 'studio'
enableRobotsTXT = true

[pagination]
pagerSize = 12

[taxonomies]
tag = 'tags'
category = 'categories'

[params]
description = 'Backend engineer writing about systems, performance, and product engineering.'
author = 'Reo'
highlight = true
color = 'blue' # blue | red | pink | green | purple | black
ogImage = '/images/projects/placeholder.svg'
brand = 'Reo' # Header/footer brand label (defaults to `title`)
email = 'reochoi109@gmail.com' # Optional: footer email under brand (falls back to data/home.toml)
spacing = 'comfortable' # comfortable | compact
showExperience = true
showSkills = true
showProjectsDivider = true
projectsClickable = false

[languages]
  [languages.ko]
  weight = 1
  languageName = '한국어'
  languageCode = 'ko-kr'
  title = 'Reo Blog'
  contentDir = 'content/ko'
    [languages.ko.params]
    brand = 'Reo'
    description = 'Backend engineer writing about systems, performance, and product engineering.'

    [languages.ko.menu]
      [[languages.ko.menu.main]]
      name = '홈'
      pageRef = '/'
      weight = 10

      [[languages.ko.menu.main]]
      name = '프로젝트'
      pageRef = '/projects'
      weight = 30

      [[languages.ko.menu.main]]
      name = '소개'
      pageRef = '/about'
      weight = 40

  [languages.en]
  weight = 2
  languageName = 'English'
  languageCode = 'en-us'
  title = 'Reo Blog'
  contentDir = 'content/en'
    [languages.en.params]
    brand = 'Reo'
    description = 'Backend engineer writing about systems, performance, and product engineering.'

    [languages.en.menu]
      [[languages.en.menu.main]]
      name = 'Home'
      pageRef = '/'
      weight = 10

      [[languages.en.menu.main]]
      name = 'Projects'
      pageRef = '/projects'
      weight = 30

      [[languages.en.menu.main]]
      name = 'About'
      pageRef = '/about'
      weight = 40

[markup]
  [markup.tableOfContents]
  endLevel = 3
  ordered = false
  startLevel = 2
