baseURL = 'https://reochoi109.github.io/'
languageCode = 'en-us'
defaultContentLanguage = 'en'
title = 'Reo Blog'
theme = 'studio'
enableRobotsTXT = true

[pagination]
pagerSize = 12

[taxonomies]
tag = 'tags'
category = 'categories'

[params]
description = 'Backend engineer writing about systems, performance, and product engineering.'
author = 'Reo'
highlight = true
color = 'blue' # blue | red | pink | green | purple | black
ogImage = '/images/projects/placeholder.svg'
brand = 'Reo' # Header/footer brand label (defaults to `title`)
email = 'reochoi109@gmail.com' # Optional: footer email under brand (falls back to data/home.toml)
spacing = 'comfortable' # comfortable | compact
showExperience = true
showSkills = true
showProjectsDivider = true
projectsClickable = false

[menu]
[[menu.main]]
name = 'Home'
url = '/'
weight = 10

[[menu.main]]
name = 'Projects'
url = '/projects/'
weight = 30

[[menu.main]]
name = 'About'
url = '/about/'
weight = 40

